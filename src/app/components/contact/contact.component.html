<section class="hero">
  <div class="hero-container">

    <div class="hero-left">
      <div class="hero-text">
        <h1>Get in Touch</h1>
        <p>Reach out for collaborations, questions, or just to say hi. I'm always open to connect!</p>
      </div>
      
      <form class="contact-form" (submit)="sendEmail($event)">
        <div class="form-group">
          <label for="name">Name</label>
          <input 
            type="text" 
            id="name"
            name="user_name"
            [(ngModel)]="name"
            placeholder="John Doe"
            maxlength="50"
            required
          />
          <hr>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email"
            name="user_email"
            [(ngModel)]="email"
            placeholder="johndoe@example.com"
            required
          />
          <hr>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea 
            id="message"
            name="message"
            [(ngModel)]="message"
            placeholder="I have a project in mind..."
            maxlength="500"
            rows="5"
          ></textarea>
          <hr>
        </div>

        <button type="submit" class="submit" [disabled]="isSending">
          {{ isSending ? 'Sending...' : 'Send' }}
        </button>

        @if (isSent) {
          <p class="success-msg">✓ Message sent!</p>
        }
        @if (isError) {
          <p class="error-msg">✗ Something went wrong, try again.</p>
        }

      </form>

      <div class="hero-buttons">
      </div>
    </div>

    <div class="hero-right">
    </div>

  </div>
</section>
